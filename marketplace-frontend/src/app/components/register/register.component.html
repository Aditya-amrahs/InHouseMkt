<div class="auth-page">
  <div class="auth-card animate-fade-in">
    <div class="auth-header">
      <div class="auth-logo">✨</div>
      <h1>Create Account</h1>
      <p>Join your company's in-house marketplace</p>
    </div>

    <div class="alert alert-danger" *ngIf="errorMsg">⚠️ {{ errorMsg }}</div>

    <form (ngSubmit)="onSubmit()" id="register-form">
      <!-- User credentials -->
      <div class="form-section-label">Login Credentials</div>

      <div class="form-group">
        <label class="form-label" for="reg-userId">Employee ID / Email</label>
        <input id="reg-userId" type="text" class="form-control"
               placeholder="emp001@company.com" [(ngModel)]="userId" name="userId" required />
      </div>

      <div class="grid-2">
        <div class="form-group">
          <label class="form-label" for="reg-password">Password</label>
          <input id="reg-password" type="password" class="form-control"
                 placeholder="Min. 6 characters" [(ngModel)]="password" name="password" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-confirm">Confirm Password</label>
          <input id="reg-confirm" type="password" class="form-control"
                 placeholder="Repeat password" [(ngModel)]="confirmPassword" name="confirmPassword" required />
        </div>
      </div>

      <!-- Employee profile -->
      <div class="form-section-label">Employee Profile</div>

      <div class="form-group">
        <label class="form-label" for="reg-name">Full Name</label>
        <input id="reg-name" type="text" class="form-control"
               placeholder="e.g. Srinidhi Rao" [(ngModel)]="empName" name="empName" required />
      </div>

      <div class="grid-2">
        <div class="form-group">
          <label class="form-label" for="reg-dept">Department</label>
          <input id="reg-dept" type="text" class="form-control"
                 placeholder="e.g. Engineering" [(ngModel)]="deptName" name="deptName" />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-location">Location</label>
          <input id="reg-location" type="text" class="form-control"
                 placeholder="e.g. Bangalore" [(ngModel)]="location" name="location" />
        </div>
      </div>

      <button id="reg-submit" type="submit" class="btn btn-primary w-full btn-lg" [disabled]="loading">
        <span *ngIf="loading">⏳ Creating account...</span>
        <span *ngIf="!loading">🎉 Create Account</span>
      </button>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a routerLink="/login">Sign in</a></p>
    </div>
  </div>

  <div class="auth-bg-decoration">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>
</div>
