<div class="page-content">
  <div class="container">
    <div class="form-page animate-fade-in">
      <div class="form-header">
        <a routerLink="/dashboard" class="back-link">← Back</a>
        <h1>{{ isEdit ? '✏️ Edit Requirement' : '📋 Post a Requirement' }}</h1>
        <p class="text-muted">{{ isEdit ? 'Update your requirement details' : 'Tell others what you need' }}</p>
      </div>

      <div *ngIf="loading" class="spinner"></div>

      <div class="card form-card" *ngIf="!loading">
        <div class="alert alert-danger" *ngIf="errorMsg">⚠️ {{ errorMsg }}</div>

        <form (ngSubmit)="onSubmit()" id="req-form">
          <div class="form-group">
            <label class="form-label" for="req-title">Title *</label>
            <input id="req-title" type="text" class="form-control"
                   placeholder="e.g. Looking for PG accommodation near Koramangala"
                   [(ngModel)]="title" name="title" required />
          </div>

          <div class="form-group">
            <label class="form-label" for="req-desc">Description</label>
            <textarea id="req-desc" class="form-control" rows="4"
                      placeholder="Provide more details about your requirement..."
                      [(ngModel)]="description" name="description"></textarea>
          </div>

          <div class="grid-2">
            <div class="form-group">
              <label class="form-label" for="req-category">Category *</label>
              <select id="req-category" class="form-control" [(ngModel)]="category" name="category" required>
                <option value="">Select category</option>
                <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="req-type">Type</label>
              <select id="req-type" class="form-control" [(ngModel)]="type" name="type">
                <option value="">Select type</option>
                <option *ngFor="let t of types" [value]="t">{{ t }}</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="req-price">Budget (₹)</label>
            <input id="req-price" type="number" class="form-control"
                   placeholder="0 for negotiable" [(ngModel)]="price" name="price" min="0" />
          </div>

          <div class="form-actions">
            <a routerLink="/dashboard" class="btn btn-outline">Cancel</a>
            <button id="req-submit" type="submit" class="btn btn-primary" [disabled]="submitting">
              <span *ngIf="submitting">⏳ Saving...</span>
              <span *ngIf="!submitting && !isEdit">📋 Post Requirement</span>
              <span *ngIf="!submitting && isEdit">✅ Update Requirement</span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
