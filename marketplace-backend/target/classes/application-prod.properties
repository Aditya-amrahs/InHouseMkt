# ============================================================
# Production Configuration - Employee In-House Marketplace
# ============================================================

spring.application.name=marketplace

# MySQL datasource provided by the hosting environment.
spring.datasource.url=${MARKETPLACE_DB_URL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MARKETPLACE_DB_USERNAME}
spring.datasource.password=${MARKETPLACE_DB_PASSWORD}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${MARKETPLACE_JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Disable dev-only H2 console in production.
spring.h2.console.enabled=false

# Server / proxy
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# Cross-origin session auth for separate frontend/backend hosts.
marketplace.cors.allowed-origins=${MARKETPLACE_CORS_ALLOWED_ORIGINS}
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=${MARKETPLACE_SESSION_COOKIE_SAME_SITE:none}
server.servlet.session.cookie.secure=${MARKETPLACE_SESSION_COOKIE_SECURE:true}

# SpringDoc / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
